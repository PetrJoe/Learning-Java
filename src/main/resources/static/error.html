<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Application Error</title>
    <style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#f7fafc;color:#2d3748;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
      .card{max-width:720px;padding:32px;border-radius:8px;background:white;box-shadow:0 6px 18px rgba(15,23,42,0.08);text-align:center}
      h1{margin:0 0 8px;font-size:28px}
      p{margin:0 0 16px;color:#4a5568}
      a.button{display:inline-block;padding:10px 16px;border-radius:6px;text-decoration:none;background:#2563eb;color:white}
      footer{margin-top:18px;font-size:13px;color:#94a3b8}
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Something went wrong</h1>
      <p>The application encountered an error. This is a friendly error page replacing the default Whitelabel Error Page.</p>
      <p>
        <a class="button" href="/">Home</a>
        <a style="margin-left:8px;" class="button" href="/swagger-ui/index.html">API Docs</a>
      </p>
      <footer>Request ID: <em>n/a</em></footer>
    </div>
  </body>
</html>
